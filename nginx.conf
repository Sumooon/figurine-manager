server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # 图片目录（挂载 NAS 目录）
    location /images/ {
        alias /images/;
        expires 1y;
        add_header Cache-Control "public, immutable";

        # 开启目录浏览
        autoindex on;
        autoindex_exact_size off;
        autoindex_localtime on;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    # 静态资源缓存
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}