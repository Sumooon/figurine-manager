name: Build and Push Docker Image

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Aliyun Registry
        uses: docker/login-action@v3
        with:
          registry: crpi-8j31e52y8cdre6l3.cn-beijing.personal.cr.aliyuncs.com
          username: ${{ secrets.ALIYUN_REGISTRY_USERNAME }}
          password: ${{ secrets.ALIYUN_REGISTRY_PASSWORD }}

      - name: Get version
        id: version
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            crpi-8j31e52y8cdre6l3.cn-beijing.personal.cr.aliyuncs.com/figurine/figurine-manager:latest
            crpi-8j31e52y8cdre6l3.cn-beijing.personal.cr.aliyuncs.com/figurine/figurine-manager:v${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max