<h2>手办编辑表单</h2>
<p class="subtitle">新增/编辑手办信息的表单设计</p>

<div class="section">
  <h3>编辑弹窗布局</h3>
  <div class="mockup">
    <div class="mockup-body" style="background: rgba(0,0,0,0.5); padding: 30px; min-height: 500px;">
      <div style="background: #fff; border-radius: 8px; max-width: 700px; margin: 0 auto; box-shadow: 0 4px 20px rgba(0,0,0,0.2);">
        <!-- 标题栏 -->
        <div style="padding: 15px 20px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center;">
          <span style="font-weight: bold; font-size: 16px;">编辑手办</span>
          <span style="color: #999; cursor: pointer;">✕</span>
        </div>
        <!-- 表单内容 -->
        <div style="padding: 20px; display: flex; gap: 20px;">
          <!-- 左侧图片区 -->
          <div style="width: 200px; flex-shrink: 0;">
            <div style="width: 200px; height: 200px; background: #f5f5f5; border: 2px dashed #ddd; border-radius: 8px; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #999;">
              <div style="font-size: 40px; margin-bottom: 10px;">📷</div>
              <div style="font-size: 13px;">图片预览</div>
            </div>
            <div style="margin-top: 10px;">
              <label style="font-size: 13px; color: #666;">图片文件</label>
              <select style="width: 100%; margin-top: 5px; padding: 8px; border: 1px solid #ddd; border-radius: 4px;">
                <option>4-5.jpg (2个手办)</option>
              </select>
            </div>
            <div style="margin-top: 10px;">
              <label style="font-size: 13px; color: #666;">图片内序号</label>
              <select style="width: 100%; margin-top: 5px; padding: 8px; border: 1px solid #ddd; border-radius: 4px;">
                <option>第1个</option>
                <option>第2个</option>
              </select>
            </div>
          </div>
          <!-- 右侧表单区 -->
          <div style="flex: 1;">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
              <div>
                <label style="display: block; font-size: 13px; color: #666; margin-bottom: 5px;">名称 *</label>
                <input type="text" placeholder="手办名称" style="width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px;">
              </div>
              <div>
                <label style="display: block; font-size: 13px; color: #666; margin-bottom: 5px;">批次</label>
                <select style="width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px;">
                  <option>2024-01 日本代购</option>
                  <option>2024-03 骏河屋</option>
                </select>
              </div>
              <div>
                <label style="display: block; font-size: 13px; color: #666; margin-bottom: 5px;">系列/IP</label>
                <input type="text" placeholder="如: VOCALOID, GUNDAM" style="width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px;">
              </div>
              <div>
                <label style="display: block; font-size: 13px; color: #666; margin-bottom: 5px;">状态</label>
                <select style="width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px;">
                  <option>在售</option>
                  <option>已出</option>
                  <option>囤货</option>
                </select>
              </div>
              <div>
                <label style="display: block; font-size: 13px; color: #666; margin-bottom: 5px;">买入价 *</label>
                <input type="number" placeholder="¥" style="width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px;">
              </div>
              <div>
                <label style="display: block; font-size: 13px; color: #666; margin-bottom: 5px;">运费分摊</label>
                <input type="number" placeholder="自动计算或手动输入" style="width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; background: #f9f9f9;">
              </div>
              <div>
                <label style="display: block; font-size: 13px; color: #666; margin-bottom: 5px;">税费分摊</label>
                <input type="number" placeholder="自动计算或手动输入" style="width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; background: #f9f9f9;">
              </div>
              <div>
                <label style="display: block; font-size: 13px; color: #666; margin-bottom: 5px;">总成本</label>
                <input type="number" readonly style="width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; background: #f0f0f0; color: #666;">
              </div>
            </div>
            <div style="margin-top: 15px;">
              <label style="display: block; font-size: 13px; color: #666; margin-bottom: 5px;">标签</label>
              <div style="display: flex; gap: 5px; flex-wrap: wrap;">
                <span style="background: #ecf5ff; color: #409eff; padding: 4px 10px; border-radius: 4px; font-size: 13px;">限定 ×</span>
                <span style="background: #ecf5ff; color: #409eff; padding: 4px 10px; border-radius: 4px; font-size: 13px;">景品 ×</span>
                <span style="background: #f5f5f5; color: #999; padding: 4px 10px; border-radius: 4px; font-size: 13px; cursor: pointer;">+ 添加标签</span>
              </div>
            </div>
            <div style="margin-top: 15px;">
              <label style="display: block; font-size: 13px; color: #666; margin-bottom: 5px;">备注</label>
              <textarea placeholder="其他备注信息..." style="width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; height: 60px; resize: none;"></textarea>
            </div>
          </div>
        </div>
        <!-- 底部按钮 -->
        <div style="padding: 15px 20px; border-top: 1px solid #eee; text-align: right;">
          <button style="background: #f5f5f5; border: 1px solid #ddd; padding: 8px 16px; border-radius: 4px; margin-right: 10px;">取消</button>
          <button style="background: #409eff; color: #fff; border: none; padding: 8px 16px; border-radius: 4px;">保存</button>
        </div>
      </div>
    </div>
  </div>
</div>

<p style="text-align: center; color: #888; margin-top: 30px;">编辑表单字段是否完整？是否需要增减字段？</p>
